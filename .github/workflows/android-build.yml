name: Android CI Build

on:
  push:
    branches: [ main, cursor/create-android-app-for-gaple-suggestions-27aa ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gaple-strategist-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: gaple-strategist-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Gaple Strategist v1.0.${{ github.run_number }}
          body: |
            🎮 **Gaple Strategist - Android Application**
            
            Aplikasi Android untuk membantu bermain Gaple dengan fitur:
            - 📷 **Camera Recognition** - Scan kartu domino secara real-time
            - 🤖 **AI Strategy Advisor** - Saran strategi terbaik
            - 📊 **Score Management** - Tracking skor multi-player
            - 📚 **Rules & Guide** - Panduan lengkap bermain Gaple
            
            **Download APK:**
            - `app-debug.apk` - Untuk testing dan development
            - `app-release-unsigned.apk` - Versi release (perlu enable unknown sources)
            
            **System Requirements:**
            - Android 8.0+ (API 26+)
            - Camera permission
            - Minimum 2GB RAM
            
            Enjoy playing Gaple! 🎯
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
