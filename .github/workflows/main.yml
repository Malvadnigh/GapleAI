name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # <<< TAMBAHKAN BAGIAN INI >>>
    defaults:
      run:
        working-directory: ./GapleAI # <-- GANTI DENGAN NAMA FOLDER ANDA

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Perintah di bawah ini sekarang akan berjalan di dalam folder 'MyAwesomeApp'
    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        # Path juga harus disesuaikan jika perlu, tapi biasanya sudah benar
        path: GapleAI/app/build/outputs/apk/debug/app-debug.apk
